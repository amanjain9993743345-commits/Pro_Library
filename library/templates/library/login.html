{% extends "library/base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
            <div class="card shadow-lg border-0 rounded-3">
                <div class="card-body p-5">
                    <div class="text-center mb-5">
                        <h2 class="h3 fw-bold mb-2">Welcome Back</h2>
                        <p class="text-muted">Sign in to your Pro Library account</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-bold mb-2">Username or Email</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                                <input type="text" name="username"
                                    class="form-control form-control-lg border-start-0 ps-0"
                                    placeholder="Enter username or email" required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold mb-2">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password"
                                    class="form-control form-control-lg border-start-0 ps-0"
                                    placeholder="Enter your password" required>
                                <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePassword()">👁️</button>
                            </div>
                        </div>

                        {% if form.errors %}
                        <div class="alert alert-danger">
                            {{ form.errors }}
                        </div>
                        {% endif %}

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="remember">
                                <label class="form-check-label small" for="remember">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="small text-decoration-none">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 py-3 fw-bold rounded-pill mb-4">
                            Sign In
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="text-muted mb-0">
                            New to Pro Library? <a href="{% url 'user_register' %}" class="fw-bold text-primary">Create
                                Account</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordField = document.querySelector('input[name="password"]');
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
    }
</script>

<style>
    .card {
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15) !important;
    }

    .input-group-text {
        border-radius: 10px 0 0 10px !important;
    }

    .form-control {
        border-radius: 0 10px 10px 0 !important;
        padding: 1rem 1.25rem !important;
    }
</style>
{% endblock %}
